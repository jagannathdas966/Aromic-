<!DOCTYPE html>
<html>
<head>
  <title>Aromic App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { margin:0; font-family:sans-serif; background:black; color:white;}
    .header {text-align:center; padding:15px; font-size:22px; font-weight:bold;}
    .card {background:#111; margin:10px; padding:10px; border-radius:12px;}
    img {width:100%; border-radius:10px;}
    button {padding:10px; width:100%; margin-top:5px; background:green; color:white; border:none; border-radius:5px;}
    .nav {position:fixed; bottom:0; width:100%; display:flex; justify-content:space-around; background:#222; padding:10px;}
  </style>
</head>

<body>

<div class="header">Aromic Agarbatti</div>

<div id="app"></div>

<div class="nav">
  <button onclick="showPage('home')">🏠</button>
  <button onclick="showPage('cart')">🛒</button>
  <button onclick="showPage('orders')">📦</button>
</div>

<script>
let page = "home";
let cart = [];
let orders = [];

const products = [
  {name:"Rose Bliss", price:180, img:"https://images.unsplash.com/photo-1603006905003-be475563bc59"},
  {name:"Sandalwood", price:200, img:"https://images.unsplash.com/photo-1596464716127-f2a82984de30"},
  {name:"Lavender", price:190, img:"https://images.unsplash.com/photo-1604335399105-a0c585fd81a1"}
];

function showPage(p){
  page = p;
  render();
}

function addToCart(i){
  cart.push(products[i]);
  alert("Added to cart");
}

function placeOrder(){
  let total = cart.reduce((a,b)=>a+b.price,0);
  let order = {id:Date.now(), items:[...cart], total};
  orders.unshift(order);

  let msg = "Order ID: "+order.id+"%0AItems: "+cart.map(c=>c.name).join(", ")+"%0ATotal: ₹"+total;
  window.open("https://wa.me/919131788345?text="+msg);

  cart = [];
  showPage("orders");
}

function render(){
  let html = "";

  if(page==="home"){
    products.forEach((p,i)=>{
      html += `
      <div class="card">
        <img src="${p.img}">
        <h3>${p.name}</h3>
        <p>₹${p.price}</p>
        <button onclick="addToCart(${i})">Add to Cart</button>
      </div>`;
    });
  }

  if(page==="cart"){
    let total = cart.reduce((a,b)=>a+b.price,0);
    html += "<h2 style='padding:10px'>Cart</h2>";
    cart.forEach(c=> html += `<p style='padding:10px'>${c.name} - ₹${c.price}</p>`);
    html += `<p style='padding:10px'><b>Total: ₹${total}</b></p>`;
    html += `<button onclick="placeOrder()">Order on WhatsApp</button>`;
  }

  if(page==="orders"){
    html += "<h2 style='padding:10px'>My Orders</h2>";
    orders.forEach(o=>{
      html += `<div class='card'>
        <p>Order #${o.id}</p>
        <p>Total: ₹${o.total}</p>
        <p>Status: Pending</p>
      </div>`;
    });
  }

  document.getElementById("app").innerHTML = html;
}

render();
</script>

</body>
</html>
